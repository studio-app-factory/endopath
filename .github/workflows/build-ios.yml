name: Build iOS

on:
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: 'Upload to TestFlight after build?'
        required: false
        default: 'false'
        type: boolean

jobs:
  # Quick precheck on a free Linux runner. If Apple Connect secrets aren't
  # configured we exit 0 here and the expensive macOS build job is skipped
  # entirely (shows as "skipped" rather than failed in the Actions UI).
  preflight:
    name: Preflight — check Apple credentials
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          IOS_DIST_CERT_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          MISSING=""
          [ -z "$APPSTORE_PRIVATE_KEY" ] && MISSING="$MISSING APPSTORE_PRIVATE_KEY"
          [ -z "$APPSTORE_KEY_ID" ] && MISSING="$MISSING APPSTORE_KEY_ID"
          [ -z "$APPSTORE_ISSUER_ID" ] && MISSING="$MISSING APPSTORE_ISSUER_ID"
          [ -z "$IOS_DIST_CERT_BASE64" ] && MISSING="$MISSING IOS_DIST_CERT_BASE64"
          [ -z "$IOS_DIST_CERT_PASSWORD" ] && MISSING="$MISSING IOS_DIST_CERT_PASSWORD"
          if [ -n "$MISSING" ]; then
            echo "::notice title=iOS build skipped::Apple Connect / signing secrets not configured. Missing:$MISSING"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build iOS IPA
    needs: preflight
    if: needs.preflight.outputs.ready == 'true'
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install web dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Add Capacitor packages (if not already present)
        run: |
          if ! grep -q '"@capacitor/ios"' package.json; then
            npm install \
              @capacitor/core@^8 \
              @capacitor/cli@^8 \
              @capacitor/ios@^8 \
              @capacitor/splash-screen@^8 \
              @capacitor/status-bar@^8 \
              @capacitor/keyboard@^8 \
              @capacitor/assets@^3
          fi

      - name: Build web app
        env:
          VITE_REVENUECAT_API_KEY_IOS: ${{ secrets.REVENUECAT_API_KEY_IOS }}
          VITE_REVENUECAT_API_KEY_ANDROID: ${{ secrets.REVENUECAT_API_KEY_ANDROID }}
          VITE_ADMOB_BANNER_ID_IOS: ${{ secrets.ADMOB_BANNER_ID_IOS }}
          VITE_ADMOB_BANNER_ID_ANDROID: ${{ secrets.ADMOB_BANNER_ID_ANDROID }}
        run: npm run build

      - name: Add iOS platform
        run: npx cap add ios || echo "iOS platform already exists"

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Inject AdMob + ATT keys into iOS Info.plist
        env:
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID_IOS }}
        run: |
          PLIST=ios/App/App/Info.plist
          if [ -z "$ADMOB_APP_ID" ]; then
            echo "ADMOB_APP_ID_IOS secret not set — skipping ad-SDK plist injection"
            exit 0
          fi
          /usr/libexec/PlistBuddy -c "Delete :GADApplicationIdentifier" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :GADApplicationIdentifier string $ADMOB_APP_ID" "$PLIST"
          /usr/libexec/PlistBuddy -c "Delete :NSUserTrackingUsageDescription" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSUserTrackingUsageDescription string 'We use your advertising ID to show non-personalised banner ads on the free tier. Pro users see no ads.'" "$PLIST"
          echo "Injected AdMob app id + ATT usage description"

      - name: Generate icons and splash screen
        run: |
          if [ -f "listing/icon.svg" ] && [ -f "listing/splash.svg" ]; then
            mkdir -p assets
            cp listing/icon.svg assets/icon.svg
            cp listing/splash.svg assets/splash.svg
            BG=$(grep -o "backgroundColor: '[^']*'" capacitor.config.ts | head -1 | grep -o "'#[^']*'" | tr -d "'")
            BG=${BG:-#000000}
            npx @capacitor/assets generate \
              --iconBackgroundColor "$BG" \
              --splashBackgroundColor "$BG" \
              --ios
          else
            echo "No listing/icon.svg or listing/splash.svg found — skipping icon generation"
          fi

      - name: Set up App Store Connect API key
        run: |
          mkdir -p ~/.private_keys
          echo "${{ secrets.APPSTORE_PRIVATE_KEY }}" | base64 -d \
            > ~/.private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8

      - name: Import distribution certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          p12-password: ${{ secrets.IOS_DIST_CERT_PASSWORD }}

      - name: Read bundle ID from capacitor config
        id: bundle
        run: |
          BID=$(grep -o "appId: '[^']*'" capacitor.config.ts | head -1 | grep -o "'[^']*'" | tr -d "'")
          echo "bundle_id=$BID" >> $GITHUB_OUTPUT

      - name: Download provisioning profile
        uses: apple-actions/download-provisioning-profiles@v3
        with:
          bundle-id: ${{ steps.bundle.outputs.bundle_id }}
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      - name: Install CocoaPods dependencies
        working-directory: ios/App
        run: pod install

      - name: Build iOS archive
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -sdk iphoneos \
            -allowProvisioningUpdates \
            -authenticationKeyID "${{ secrets.APPSTORE_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APPSTORE_ISSUER_ID }}" \
            -authenticationKeyPath "$HOME/.private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8" \
            clean archive

      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST

          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyID "${{ secrets.APPSTORE_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APPSTORE_ISSUER_ID }}" \
            -authenticationKeyPath "$HOME/.private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 30

      - name: Upload to TestFlight
        if: github.event.inputs.upload_to_testflight == 'true'
        run: |
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$(ls $RUNNER_TEMP/ipa/*.ipa | head -1)" \
            --apiKey "${{ secrets.APPSTORE_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_ISSUER_ID }}"
